# Docker
# Build and push an image to Azure Container Registry
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
- main

resources:
- repo: self

variables:
  # Container registry service connection established during pipeline creation
  dockerRegistryServiceConnection: 'petzimitev77'
  imageRepository: 'petzmitevgsspringbootdocker'
  containerRegistry: 'petzimitev77-awhkayhndqbhgzcw.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/complete/Dockerfile'
  tag: '$(Build.BuildId)'

  # Agent VM image name
  vmImageName: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build and push stage
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: $(vmImageName)
    steps:
    
    - task: Maven@4
      displayName: 'Build Java app'
      inputs:
        mavenPomFile: 'complete/pom.xml'
        goals: 'package spring-boot:repackage'
    
    
    
    - task: Docker@2
      displayName: Build and push an image to container registry
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: 'complete/Dockerfile'
        buildContext: 'complete'
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
