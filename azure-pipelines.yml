trigger:
- main

variables:
- group: New variable group 14-us-pass

- name: vmImageName
  value: ubuntu-latest

- name: tag
  value: $(Build.BuildId)

stages:
- stage: Build
  displayName: Build and push stage
  jobs:
  - job: Build
    pool:
      vmImage: $(vmImageName)

    steps:

    - task: Maven@4
      displayName: Build Java app
      inputs:
        mavenPomFile: complete/pom.xml
        goals: package spring-boot:repackage

    - script: |
        docker login petzimitev77.azurecr.io \
          -u $(ACR_USERNAME) \
          -p $(ACR_PASSWORD)
      displayName: Docker login

    - task: Docker@2
      displayName: Build and push
      inputs:
        command: buildAndPush
        repository: petzimitev77.azurecr.io/gs-spring-boot-docker
        dockerfile: complete/Dockerfile
        buildContext: complete
        tags: |
          $(tag)