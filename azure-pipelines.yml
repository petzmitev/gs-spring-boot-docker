trigger:
- main

variables:
- name: vmImageName
  value: ubuntu-latest

- name: tag
  value: $(Build.BuildId)

- name: imageRepository
  value: 'firstrepository'

- name: dockerRegistryServiceConnection
  value: 'acr-connection'

- name: containerRegistry
  value: 'petzimitev77.azurecr.io'

- name: webAppName
  value: 'sample-docker-web-app'

- name: azureSubscription
  value: 'Azure for Students(435f5de9-8733-4130-8215-eb8ef96335c8)'

stages:
# ---------------- BUILD ----------------
- stage: Build
  displayName: Build and push stage
  jobs:
  - job: Build
    pool:
      vmImage: $(vmImageName)

    steps:
    - task: Maven@4
      displayName: Build Java app
      inputs:
        mavenPomFile: complete/pom.xml
        goals: package spring-boot:repackage

    - task: Docker@2
      displayName: Build and push image
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: complete/Dockerfile
        buildContext: complete
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)

# ---------------- DEPLOY ----------------
- stage: Deploy
  displayName: Deploy to Web App
  dependsOn: Build
  jobs:
  - job: Deploy
    pool:
      vmImage: $(vmImageName)

    steps:
    - task: AzureWebAppContainer@1
      displayName: Deploy to Azure Web App
      inputs:
        azureSubscription: $(azureSubscription)
        appName: $(webAppName)
        containers: $(containerRegistry)/$(imageRepository):$(tag)